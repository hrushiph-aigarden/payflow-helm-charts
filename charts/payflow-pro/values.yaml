# PayFlow Pro Helm Chart — Default Values (production-safe defaults)
# Override per environment with: -f values-{env}.yaml

replicaCount: 3

image:
  repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/payflow-pro
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""  # Set per environment (IRSA)
  name: "payflow-pro"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

livenessProbe:
  httpGet:
    path: /healthz/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /healthz/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

startupProbe:
  httpGet:
    path: /healthz/live
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 12  # 60s to start

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  grpcPort: 9090

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
  hosts:
    - host: api.payflow.fintechcorp.com
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

vault:
  enabled: true
  role: payflow-pro
  secrets:
    - path: payflow/prod/db-credentials
      key: db-credentials
    - path: payflow/prod/payment-gateway-api-keys
      key: gateway-keys

env:
  LOG_LEVEL: info
  PAYMENT_GATEWAY_URL: https://api.stripe.com
  METRICS_PORT: "8080"
  GRPC_PORT: "9090"

nodeSelector:
  pci-scope: "true"

tolerations:
  - key: dedicated
    value: payflow
    operator: Equal
    effect: NoSchedule

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: payflow-pro
          topologyKey: kubernetes.io/hostname
