name: 'Helm Lint & Test'

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'charts/**'

jobs:
  lint:
    name: 'Helm Lint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Set up Python (for chart-testing)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (lint)
        run: ct lint --config .ct.yaml

      - name: Helm template check (all environments)
        run: |
          for ENV in dev staging prod; do
            echo "=== Validating values-${ENV}.yaml ==="
            helm template payflow-pro ./charts/payflow-pro \
              -f charts/payflow-pro/values-${ENV}.yaml \
              --debug > /dev/null
            echo "values-${ENV}.yaml: OK"
          done

      - name: Validate Argo CD manifests
        run: |
          kubectl apply --dry-run=client -f argocd/payflow-app.yaml \
          --server-side=false 2>&1 || true  # Skip if no cluster in CI
