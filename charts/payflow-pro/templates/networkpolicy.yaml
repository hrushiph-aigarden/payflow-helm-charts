{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "payflow-pro.fullname" . }}
  labels:
    {{- include "payflow-pro.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "payflow-pro.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ALB (ingress controller)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
    # Allow gRPC from other internal services
    - from:
        - namespaceSelector:
            matchLabels:
              pci-scope: "true"
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
    # Allow outbound to RDS (port 5432)
    - to:
        - ipBlock:
            cidr: 10.0.48.0/22  # DB subnets
      ports:
        - protocol: TCP
          port: 5432
    # Allow outbound to Vault
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
    # Allow HTTPS to payment gateways
    - to: []
      ports:
        - protocol: TCP
          port: 443
{{- end }}
